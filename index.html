<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>UTILIDADES</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{

background:
linear-gradient(
180deg,
#071447,
#02061b
);

color:white;

height:100vh;

overflow:hidden;

}

.container{

display:grid;

grid-template-columns:
260px 1fr;

height:100vh;

}

/* SIDEBAR */

.sidebar{

background:#02081d;

padding:24px;

overflow:auto;

}

.logo{

text-align:center;

margin-bottom:30px;

}

.logo h1{

font-size:30px;

}

.logo span{

opacity:.7;

}

/* MENU */

.menu{

display:flex;

flex-direction:column;

gap:8px;

}

.item{

padding:14px;

border-radius:14px;

cursor:pointer;

font-weight:600;

}

.item:hover,
.item.active{

background:

linear-gradient(
90deg,
#3840b8,
#20295f
);

}

/* CONTENT */

.content{

padding:30px;

overflow:auto;

}

.panel{

display:none;

}

.panel.active{

display:block;

}

h2{

margin-bottom:20px;

}

.app{

padding:24px;

border-radius:18px;

background:

rgba(255,255,255,.04);

}

input{

width:100%;

padding:14px;

margin-top:14px;

border:none;

border-radius:10px;

}

button{

margin-top:16px;

padding:12px 18px;

border:none;

background:#5d62ff;

color:white;

border-radius:12px;

cursor:pointer;

}

img{

max-width:260px;

margin-top:20px;

border-radius:14px;

}

#qrcode{

margin-top:20px;

background:white;

padding:10px;

display:inline-block;

}

@media(max-width:768px){

body{
overflow:auto;
}

.container{

display:flex;

flex-direction:column;

}

.menu{

overflow:auto;

}

}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">

<h1>NEWCOSMO</h1>

<span>UTILIDADES</span>

</div>


<div class="menu">

<div class="item active"
onclick="show('doc',this)">
📄 DOCUMENTOS
</div>

<div class="item"
onclick="show('img',this)">
🖼️ IMÁGENES
</div>

<div class="item"
onclick="show('qr',this)">
🔳 QR
</div>

<div class="item"
onclick="show('crop',this)">
✂️ RECORTAR
</div>

<div class="item"
onclick="show('mp3',this)">
🎵 DESCARGAR MP3
</div>

<div class="item"
onclick="show('video',this)">
🎬 DESCARGAR VIDEO
</div>

</div>

</div>


<div class="content">

<div id="doc"
class="panel active">

<h2>📄 DOCUMENTOS</h2>

<div class="app">

<input type="file">

</div>

</div>


<div id="img"
class="panel">

<h2>🖼️ IMÁGENES</h2>

<div class="app">

<input
type="file"
accept="image/*"
onchange="preview(event)">

<img id="preview">

</div>

</div>


<div id="qr"
class="panel">

<h2>🔳 QR</h2>

<div class="app">

<input
id="qrText"
placeholder="Texto o URL">

<button
onclick="generateQR()">

Generar

</button>

<div id="qrcode"></div>

</div>

</div>


<div id="crop"
class="panel">

<h2>✂️ RECORTAR</h2>

<div class="app">

<input
type="file"
accept="image/*">

</div>

</div>


<div id="mp3"
class="panel">

<h2>🎵 DESCARGAR MP3</h2>

<div class="app">

<input placeholder="Pega URL">

<button>
Descargar
</button>

</div>

</div>


<div id="video"
class="panel">

<h2>🎬 DESCARGAR VIDEO</h2>

<div class="app">

<input placeholder="Pega URL">

<button>
Descargar
</button>

</div>

</div>

</div>

</div>

<script>

function show(id,el){

document
.querySelectorAll(".panel")
.forEach(
x=>x.style.display="none"
);

document
.getElementById(id)
.style.display="block";

document
.querySelectorAll(".item")
.forEach(
x=>x.classList.remove("active")
);

el.classList.add("active");

}

function preview(e){

preview.src=
URL.createObjectURL(
e.target.files[0]
);

}

function generateQR(){

qrcode.innerHTML="";

new QRCode(
qrcode,
qrText.value
);

}

</script>

</body>

</html>
