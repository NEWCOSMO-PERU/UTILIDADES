```html
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dashboard Hub</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{

background:
linear-gradient(
180deg,
#071447,
#02061b
);

color:white;

height:100vh;

overflow:hidden;

}

.container{

display:grid;

grid-template-columns:
260px 1fr;

height:100vh;

}

.sidebar{

background:#02081d;

padding:20px;

}

.logo{

text-align:center;

margin-bottom:25px;

}

.logo h1{

font-size:30px;

}

.logo span{

opacity:.7;

}

.menu{

display:flex;

flex-direction:column;

gap:10px;

}

.item{

padding:14px;

border-radius:14px;

cursor:pointer;

}

.item:hover,
.active{

background:

linear-gradient(
90deg,
#3840b8,
#20295f
);

}

.content{

padding:30px;

overflow:auto;

}

.panel{

display:none;

}

.panel.active{

display:block;

}

h2{

margin-bottom:20px;

}

.tools{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:18px;

}

.tool{

padding:22px;

background:

rgba(255,255,255,.04);

border-radius:20px;

}

.tool h3{

margin:12px 0;

}

.tool button{

padding:12px 18px;

border:none;

border-radius:10px;

background:#5860ff;

color:white;

cursor:pointer;

}

.app{

display:none;

margin-top:30px;

padding:25px;

border-radius:18px;

background:

rgba(255,255,255,.04);

}

.app.active{

display:block;

}

input{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:10px;

}

img{

max-width:260px;

margin-top:20px;

border-radius:14px;

}

#qrcode{

margin-top:20px;

background:white;

padding:10px;

display:inline-block;

}

button{

margin-top:12px;

}

@media(max-width:768px){

body{
overflow:auto;
}

.container{

display:flex;

flex-direction:column;

}

.menu{

flex-direction:row;

overflow:auto;

}

.item{

white-space:nowrap;

}

}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">

<h1>DASHBOARD</h1>

<span>HUB</span>

</div>

<div class="menu">

<div class="item active"
onclick="show('utilidades',this)">

🛠 UTILIDADES

</div>

</div>

</div>


<div class="content">

<div
id="utilidades"
class="panel active">

<h2>UTILIDADES</h2>

<div class="tools">

<div class="tool">

📄

<h3>DOCUMENTOS</h3>

<button onclick="openTool('doc')">
Abrir
</button>

</div>


<div class="tool">

🖼️

<h3>IMÁGENES</h3>

<button onclick="openTool('img')">
Abrir
</button>

</div>


<div class="tool">

🔳

<h3>QR</h3>

<button onclick="openTool('qr')">
Abrir
</button>

</div>


<div class="tool">

✂️

<h3>RECORTAR</h3>

<button onclick="openTool('crop')">
Abrir
</button>

</div>


<div class="tool">

🎵

<h3>DESCARGAR MP3</h3>

<button onclick="openTool('mp3')">
Abrir
</button>

</div>


<div class="tool">

🎬

<h3>DESCARGAR VIDEO</h3>

<button onclick="openTool('video')">
Abrir
</button>

</div>

</div>


<div id="doc" class="app">

<h3>📄 DOCUMENTOS</h3>

<input type="file">

</div>


<div id="img" class="app">

<h3>🖼️ IMÁGENES</h3>

<input
type="file"
accept="image/*"
onchange="preview(event)">

<img id="preview">

</div>


<div id="qr" class="app">

<h3>🔳 GENERADOR QR</h3>

<input
id="qrText"
placeholder="Texto o URL">

<button onclick="generateQR()">

Generar

</button>

<div id="qrcode"></div>

</div>


<div id="crop" class="app">

<h3>✂️ RECORTAR</h3>

<input
type="file"
accept="image/*">

</div>


<div id="mp3" class="app">

<h3>🎵 DESCARGAR MP3</h3>

<input
placeholder="Pega URL">

<button>

Descargar

</button>

</div>


<div id="video" class="app">

<h3>🎬 DESCARGAR VIDEO</h3>

<input
placeholder="Pega URL">

<button>

Descargar

</button>

</div>

</div>

</div>

</div>

<script>

function openTool(id){

document
.querySelectorAll(".app")
.forEach(
x=>x.classList.remove("active")
);

document
.getElementById(id)
.classList.add("active");

}

function preview(e){

document
.getElementById(
"preview"
).src=
URL.createObjectURL(
e.target.files[0]
);

}

function generateQR(){

let qr=
document
.getElementById(
"qrcode"
);

qr.innerHTML="";

new QRCode(
qr,
document
.getElementById(
"qrText"
).value
);

}

</script>

</body>

</html>
```
